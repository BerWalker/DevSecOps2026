apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # General variables (Replace placeholders with your values)
  INTERNAL_API_KEY: "your_internal_api_key"
  GATEWAY_PORT: "5000"
  
  # Auth Service
  AUTH_POSTGRES_USER: "auth_user"
  AUTH_POSTGRES_DB: "auth_db"
  AUTH_SERVICE_PORT: "5001"
  AUTH_DATABASE_URL: "postgresql+psycopg://auth_user:auth_password@postgres-auth:5432/auth_db"

  # Campaign Service
  CAMPAIGN_POSTGRES_USER: "campaign_user"
  CAMPAIGN_POSTGRES_DB: "campaign_db"
  CAMPAIGN_SERVICE_PORT: "5002"
  TRACKING_BASE_URL: "http://localhost:5000"
  GATEWAY_URL: "http://gateway.default.svc.cluster.local"
  CAMPAIGN_DATABASE_URL: "postgresql+psycopg://campaign_user:campaign_password@postgres-campaign:5432/campaign_db"

  # Analytics Service
  ANALYTICS_POSTGRES_USER: "analytics_user"
  ANALYTICS_POSTGRES_DB: "analytics_db"
  ANALYTICS_SERVICE_PORT: "5003"
  CAMPAIGN_SERVICE_URL: "http://campaign.default.svc.cluster.local:5002"
  ANALYTICS_DATABASE_URL: "postgresql+psycopg://analytics_user:analytics_password@postgres-analytics:5432/analytics_db"

  # Email Service
  EMAIL_SERVICE_PORT: "5010"
  GMAIL_FROM: "example@gmail.com"
  GMAIL_USER: "example_user"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
data:
  # Base64 encoded values for passwords
  # Echo -n "password" | base64
  AUTH_POSTGRES_PASSWORD: "YXV0aF9wYXNzd29yZA==" 
  CAMPAIGN_POSTGRES_PASSWORD: "Y2FtcGFpZ25fcGFzc3dvcmQ="
  ANALYTICS_POSTGRES_PASSWORD: "YW5hbHl0aWNzX3Bhc3N3b3Jk"
  JWT_SECRET_KEY: "c3VwZXJzZWNyZXRqd3Q="
  GMAIL_APP_PASSWORD: "Z21haWxfYXBwX3Bhc3N3b3Jk"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        resolver kube-dns.kube-system.svc.cluster.local valid=10s;
        resolver_timeout 5s;
        
        server_tokens off;
        client_max_body_size 64k;

        # Rate limit: 10 req/s per IP on auth routes (burst 20)
        limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=campaign_limit:10m rate=20r/s;
        limit_req_zone $binary_remote_addr zone=analytics_limit:10m rate=20r/s;
        limit_req_zone $binary_remote_addr zone=email_limit:10m rate=10r/s;

        # Allowed Origin for CORS
        map $http_origin $cors_allow_origin {
            default "";
            ~^https?://(localhost|127\.0\.0\.1)(:\d+)?$ $http_origin;
        }

        # Upstreams mapeados para os Services do Kubernetes
        upstream auth {
            server auth.default.svc.cluster.local:5001;
        }

        upstream campaign {
            server campaign.default.svc.cluster.local:5002;
        }

        upstream analytics {
            server analytics.default.svc.cluster.local:5003;
        }

        upstream email {
            server email.default.svc.cluster.local:5010;
        }

        upstream frontend {
            server frontend.default.svc.cluster.local:80;
        }

        server {
            listen 80;

            # Security headers on all gateway responses
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

            location /api/auth/ {
                limit_req zone=auth_limit burst=20 nodelay;

                if ($request_method !~ ^(POST|OPTIONS)$) {
                    return 405;
                }

                if ($request_method = OPTIONS) {
                    add_header Access-Control-Allow-Origin $cors_allow_origin always;
                    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                    add_header Access-Control-Max-Age 86400 always;
                    add_header Vary "Origin" always;
                    add_header Content-Length 0 always;
                    add_header Content-Type "text/plain; charset=utf-8" always;
                    return 204;
                }

                add_header Access-Control-Allow-Origin $cors_allow_origin always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Vary "Origin" always;

                proxy_pass http://auth;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 10s;
                proxy_read_timeout 30s;
                proxy_send_timeout 30s;
            }

            location /api/campaigns {
                limit_req zone=campaign_limit burst=40 nodelay;

                if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS)$) {
                    return 405;
                }

                if ($request_method = OPTIONS) {
                    add_header Access-Control-Allow-Origin $cors_allow_origin always;
                    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                    add_header Access-Control-Max-Age 86400 always;
                    add_header Vary "Origin" always;
                    add_header Content-Length 0 always;
                    add_header Content-Type "text/plain; charset=utf-8" always;
                    return 204;
                }

                add_header Access-Control-Allow-Origin $cors_allow_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Vary "Origin" always;

                proxy_pass http://campaign;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 10s;
                proxy_read_timeout 30s;
                proxy_send_timeout 30s;
            }

            location /api/analytics {
                limit_req zone=analytics_limit burst=40 nodelay;

                if ($request_method !~ ^(GET|OPTIONS)$) {
                    return 405;
                }

                if ($request_method = OPTIONS) {
                    add_header Access-Control-Allow-Origin $cors_allow_origin always;
                    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
                    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                    add_header Access-Control-Max-Age 86400 always;
                    add_header Vary "Origin" always;
                    add_header Content-Length 0 always;
                    add_header Content-Type "text/plain; charset=utf-8" always;
                    return 204;
                }

                add_header Access-Control-Allow-Origin $cors_allow_origin always;
                add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Vary "Origin" always;

                proxy_pass http://analytics;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 10s;
                proxy_read_timeout 30s;
                proxy_send_timeout 30s;
            }

            location /track/ {
                limit_req zone=analytics_limit burst=60 nodelay;

                if ($request_method !~ ^(GET|POST|OPTIONS)$) {
                    return 405;
                }

                proxy_pass http://analytics;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 10s;
                proxy_read_timeout 30s;
                proxy_send_timeout 30s;
            }

            location /api/internal/token/ {
                limit_req zone=auth_limit burst=20 nodelay;

                if ($request_method !~ ^(POST|OPTIONS)$) {
                    return 405;
                }

                if ($request_method = OPTIONS) {
                    add_header Access-Control-Allow-Origin $cors_allow_origin always;
                    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Internal-Key" always;
                    add_header Access-Control-Max-Age 86400 always;
                    add_header Vary "Origin" always;
                    add_header Content-Length 0 always;
                    add_header Content-Type "text/plain; charset=utf-8" always;
                    return 204;
                }

                add_header Access-Control-Allow-Origin $cors_allow_origin always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Internal-Key" always;
                add_header Vary "Origin" always;

                proxy_pass http://auth;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 10s;
                proxy_read_timeout 30s;
                proxy_send_timeout 30s;
            }

            location /api/internal/ {
                limit_req zone=email_limit burst=20 nodelay;

                if ($request_method !~ ^(POST|OPTIONS)$) {
                    return 405;
                }

                if ($request_method = OPTIONS) {
                    add_header Access-Control-Allow-Origin $cors_allow_origin always;
                    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Internal-Key" always;
                    add_header Access-Control-Max-Age 86400 always;
                    add_header Vary "Origin" always;
                    add_header Content-Length 0 always;
                    add_header Content-Type "text/plain; charset=utf-8" always;
                    return 204;
                }

                add_header Access-Control-Allow-Origin $cors_allow_origin always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Internal-Key" always;
                add_header Vary "Origin" always;

                proxy_pass http://email;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 10s;
                proxy_read_timeout 30s;
                proxy_send_timeout 30s;
            }

            location / {
                proxy_pass http://frontend;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Frame-Options "DENY" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
                add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'" always;
            }
        }
    }