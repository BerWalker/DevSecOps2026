apiVersion: apps/v1
kind: Deployment
metadata:
  name: email
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email
  template:
    metadata:
      labels:
        app: email
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "my-app-role"
        vault.hashicorp.com/agent-inject-secret-env-vars: "secret/data/my-app/env"
        # The dynamic loop: reads all keys in Vault and exports them automatically
        vault.hashicorp.com/agent-inject-template-env-vars: |
          {{- with secret "secret/data/my-app/env" -}}
          {{- range $k, $v := .Data.data }}
          export {{ $k }}="{{ $v }}"
          {{- end }}
          {{- end -}}
    spec:
      serviceAccountName: my-app-sa
      containers:
        - name: email
          image: email:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5010
          
          # Load the non-sensitive configuration directly from the cleaned ConfigMap
          env:
            - name: EMAIL_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: EMAIL_SERVICE_PORT
                  
          # Override the startup command to load Vault secrets into the environment
          command: ["/bin/sh", "-c"]
          args:
            - |
              . /vault/secrets/env-vars
              
              exec /docker-entrypoint.sh
---
apiVersion: v1
kind: Service
metadata:
  name: email
spec:
  selector:
    app: email
  ports:
    - port: 5010
      targetPort: 5010