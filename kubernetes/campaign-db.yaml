apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-campaign
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-campaign
  template:
    metadata:
      labels:
        app: postgres-campaign
    spec:
      containers:
        - name: campaign-postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CAMPAIGN_POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CAMPAIGN_POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CAMPAIGN_POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: campaign-pg-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-campaign
spec:
  ports:
    - port: 5432
  selector:
    app: postgres-campaign