apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auth-pg-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-auth
  template:
    metadata:
      labels:
        app: postgres-auth
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "my-app-role"
        vault.hashicorp.com/agent-inject-secret-env-vars: "secret/data/my-app/env"
        vault.hashicorp.com/agent-init-cpu-request: "0"
        vault.hashicorp.com/agent-init-mem-request: "0"
        vault.hashicorp.com/agent-cpu-request: "0"
        vault.hashicorp.com/agent-mem-request: "0"
        # Map the specific Auth DB keys to standard Postgres environment variables
        vault.hashicorp.com/agent-inject-template-env-vars: |
          {{- with secret "secret/data/my-app/env" -}}
          export POSTGRES_USER="{{ .Data.data.AUTH_POSTGRES_USER }}"
          export POSTGRES_DB="{{ .Data.data.AUTH_POSTGRES_DB }}"
          export POSTGRES_PASSWORD="{{ .Data.data.AUTH_POSTGRES_PASSWORD }}"
          {{- end -}}
    spec:
      serviceAccountName: my-app-sa
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          # Override command to load Vault secrets and then start Postgres
          command: ["/bin/sh", "-c"]
          args:
            - |
              . /vault/secrets/env-vars
              exec docker-entrypoint.sh postgres
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              # Source the secrets in the probe shell so pg_isready has the variables
              command: ["sh", "-c", ". /vault/secrets/env-vars && pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: auth-pg-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-auth
spec:
  selector:
    app: postgres-auth
  ports:
    - port: 5432

