apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:16
          command: ['sh', '-c', 'until pg_isready -h postgres-analytics -p 5432; do echo waiting for database; sleep 2; done;']
      containers:
        - name: analytics-service
          image: analytics:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ANALYTICS_DATABASE_URL
            - name: ANALYTICS_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ANALYTICS_SERVICE_PORT
            - name: CAMPAIGN_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CAMPAIGN_SERVICE_URL
            - name: GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: GATEWAY_URL
            - name: INTERNAL_API_KEY
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: INTERNAL_API_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET_KEY
          ports:
            - containerPort: 5003
---
apiVersion: v1
kind: Service
metadata:
  name: analytics
spec:
  ports:
    - port: 5003
      targetPort: 5003
  selector:
    app: analytics