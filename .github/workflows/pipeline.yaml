name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration-tests:
    runs-on: ubuntu-latest
    needs: secret-scanning

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare environment
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start stack and wait for readiness
        run: docker compose up -d --wait --build

      - name: Run integration tests
        run: python -m pytest tests/ -v

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    needs: integration-tests
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v6

      - name: Run custom Semgrep rules
        run: semgrep scan --config .semgrep/ --error

      - name: Run Semgrep
        run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  fossa:
    name: FOSSA
    runs-on: ubuntu-latest
    needs: semgrep

    steps:
      - uses: actions/checkout@v6

      - name: Run FOSSA
        uses: fossas/fossa-action@main
        with:
          api-key: ${{ secrets.FOSSA_APP_TOKEN }}

  dast:
    name: DAST
    runs-on: ubuntu-latest
    needs: fossa

    steps:
      - uses: actions/checkout@v6

      - name: Prepare environment
        run: cp .env.example .env

      - name: Start stack and wait for readiness
        run: docker compose up -d --wait --build

      - name: Run OWASP ZAP baseline scan
        run: |
          NETWORK="$(docker compose ps -q gateway | xargs docker inspect -f '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}')"
          docker run --rm \
            --network "$NETWORK" \
            -v "$PWD:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://gateway \
              -c /zap/wrk/.zap/rules.tsv \
              -J /zap/wrk/zap-report.json \
              -r /zap/wrk/zap-report.html \
              -w /zap/wrk/zap-report.md \
              -I

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-report.json
            zap-report.html
            zap-report.md

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  k8s-integration-tests:
    runs-on: ubuntu-latest
    needs: dast

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare environment
        run: cp .env.example .env

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start minikube
        uses: medyagh/setup-minikube@latest
        with:
          cpus: max
          memory: max

      - name: Build and load images
        run: |
          docker build -f frontend/Dockerfile          -t frontend:latest .
          docker build -f services/auth/Dockerfile     -t auth:latest .
          docker build -f services/campaign/Dockerfile -t campaign:latest .
          docker build -f services/analytics/Dockerfile -t analytics:latest .
          docker build -f services/email/Dockerfile    -t email:latest .
          minikube image load frontend:latest auth:latest campaign:latest analytics:latest email:latest

      - name: Deploy Vault
        run: bash ./vault/deploy-vault-ci.sh

      - name: Deploy
        run: kubectl apply -k kubernetes/

      - name: Wait for pods
        run: |
          echo "=== Waiting for Vault Agent Injector webhook ==="
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=vault-agent-injector -n vault --timeout=120s

          echo "=== Waiting for Postgres pods ==="
          kubectl wait --for=condition=ready pod -l app=postgres-auth    --timeout=300s || true
          kubectl wait --for=condition=ready pod -l app=postgres-campaign --timeout=300s || true
          kubectl wait --for=condition=ready pod -l app=postgres-analytics --timeout=300s || true

          echo "=== Waiting for remaining pods ==="
          kubectl wait --for=condition=ready pod --all --timeout=300s

      - name: Debug pod status (on failure)
        if: failure()
        run: |
          echo "=== POD STATUS ==="
          kubectl get pods -o wide
          echo ""
          echo "=== EVENTS ==="
          kubectl get events --sort-by='.lastTimestamp' | tail -60
          echo ""
          for pod in $(kubectl get pods --no-headers -o custom-columns=':metadata.name'); do
            echo "=== DESCRIBE $pod ==="
            kubectl describe pod "$pod" | tail -30
            echo ""
            echo "=== LOGS $pod (main) ==="
            kubectl logs "$pod" --all-containers=true --tail=20 2>/dev/null || true
            echo ""
          done

      - name: Port-forward gateway
        run: kubectl port-forward svc/gateway 5000:80 &

      - name: Wait for gateway
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/ && break || sleep 5
          done

      - name: Run integration tests
        env:
          INTEGRATION_BASE_URL: http://localhost:5000
          INTERNAL_API_KEY: change-me-internal-key
        run: python -m pytest tests/ -v
