name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare environment
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start stack and wait for readiness
        run: docker compose up -d --wait --build

      - name: Run integration tests
        run: python -m pytest tests/ -v

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  k8s-integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare environment
        run: cp .env.example .env

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start minikube
        uses: medyagh/setup-minikube@latest

      - name: Build images inside minikube
        run: |
          eval $(minikube docker-env)
          docker build -f frontend/Dockerfile          -t frontend:latest .
          docker build -f services/auth/Dockerfile     -t auth:latest .
          docker build -f services/campaign/Dockerfile -t campaign:latest .
          docker build -f services/analytics/Dockerfile -t analytics:latest .
          docker build -f services/email/Dockerfile    -t email:latest .

      - name: Deploy
        run: kubectl apply -k kubernetes/

      - name: Wait for pods
        run: kubectl wait --for=condition=ready pod --all --timeout=300s

      - name: Port-forward gateway
        run: kubectl port-forward svc/gateway 5000:80 &

      - name: Wait for gateway
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/ && break || sleep 5
          done

      - name: Run integration tests
        env:
          INTEGRATION_BASE_URL: http://localhost:5000
          INTERNAL_API_KEY: change-me-internal-key
        run: python -m pytest tests/ -v

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    needs: [integration-tests, k8s-integration-tests]
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v6

      - name: Run custom Semgrep rules
        run: semgrep scan --config .semgrep/ --error

      - name: Run Semgrep
        run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  fossa:
    name: FOSSA
    runs-on: ubuntu-latest
    needs: semgrep

    steps:
      - uses: actions/checkout@v6

      - name: Run FOSSA
        uses: fossas/fossa-action@main
        with:
          api-key: ${{ secrets.FOSSA_APP_TOKEN }}