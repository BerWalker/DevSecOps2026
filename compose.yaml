services:
  gateway:
    image: nginx:alpine
    container_name: api_gateway
    ports:
      - "${GATEWAY_PORT:-5000}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth:
        condition: service_started
      campaign:
        condition: service_started
      analytics:
        condition: service_started
      email:
        condition: service_started
      frontend:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend_service

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: auth_service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${AUTH_POSTGRES_USER}:${AUTH_POSTGRES_PASSWORD}@postgres-auth:5432/${AUTH_POSTGRES_DB}
      AUTH_SERVICE_PORT: "5001"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres-auth:
        condition: service_healthy

  campaign:
    build:
      context: .
      dockerfile: services/campaign/Dockerfile
    container_name: campaign_service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${CAMPAIGN_POSTGRES_USER}:${CAMPAIGN_POSTGRES_PASSWORD}@postgres-campaign:5432/${CAMPAIGN_POSTGRES_DB}
      CAMPAIGN_SERVICE_PORT: "5002"
      TRACKING_BASE_URL: http://localhost:${GATEWAY_PORT:-5000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      GATEWAY_URL: http://gateway
    depends_on:
      postgres-campaign:
        condition: service_healthy

  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    container_name: analytics_service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${ANALYTICS_POSTGRES_USER}:${ANALYTICS_POSTGRES_PASSWORD}@postgres-analytics:5432/${ANALYTICS_POSTGRES_DB}
      ANALYTICS_SERVICE_PORT: "5003"
      CAMPAIGN_SERVICE_URL: http://campaign:5002
      GATEWAY_URL: http://gateway
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres-analytics:
        condition: service_healthy
      campaign:
        condition: service_started

  email:
    build:
      context: .
      dockerfile: services/email/Dockerfile
    container_name: email_service
    env_file:
      - .env
    environment:
      EMAIL_SERVICE_PORT: "5010"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      GMAIL_FROM: ${GMAIL_FROM}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}

  postgres-auth:
    image: postgres:16
    container_name: auth_postgres
    environment:
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
    ports:
      - "${AUTH_POSTGRES_PORT:-5432}:5432"
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-campaign:
    image: postgres:16
    container_name: campaign_postgres
    environment:
      POSTGRES_USER: ${CAMPAIGN_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CAMPAIGN_POSTGRES_PASSWORD}
      POSTGRES_DB: ${CAMPAIGN_POSTGRES_DB}
    ports:
      - "${CAMPAIGN_POSTGRES_PORT:-5433}:5432"
    volumes:
      - campaign_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CAMPAIGN_POSTGRES_USER} -d ${CAMPAIGN_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-analytics:
    image: postgres:16
    container_name: analytics_postgres
    environment:
      POSTGRES_USER: ${ANALYTICS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ANALYTICS_POSTGRES_DB}
    ports:
      - "${ANALYTICS_POSTGRES_PORT:-5434}:5432"
    volumes:
      - analytics_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_POSTGRES_USER} -d ${ANALYTICS_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  auth_pg_data:
  campaign_pg_data:
  analytics_pg_data:
