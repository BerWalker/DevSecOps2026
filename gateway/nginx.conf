events {
    worker_connections 1024;
}

http {
    server_tokens off;
    client_max_body_size 64k;

    # Rate limit: 10 req/s per IP on auth routes (burst 20)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=campaign_limit:10m rate=20r/s;

    # Allowed Origin for CORS (empty = browser blocks cross-origin)
    # Dev: localhost / 127.0.0.1 with any port. Tighten in production.
    map $http_origin $cors_allow_origin {
        default "";
        "~^https?://(localhost|127\.0\.0\.1)(:\d+)?$" $http_origin;
    }

    upstream auth {
        server auth:5001;
    }

    upstream campaign {
        server campaign:5002;
    }

    server {
        listen 80;

        # Security headers on all gateway responses
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            # Auth API only accepts POST; OPTIONS for CORS preflight
            if ($request_method !~ ^(POST|OPTIONS)$) {
                return 405;
            }

            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_allow_origin always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Vary "Origin" always;
                add_header Content-Length 0 always;
                add_header Content-Type "text/plain; charset=utf-8" always;
                return 204;
            }

            # CORS on actual requests (when Origin is allowed)
            add_header Access-Control-Allow-Origin $cors_allow_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Vary "Origin" always;

            proxy_pass http://auth;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        location /api/campaigns {
            limit_req zone=campaign_limit burst=40 nodelay;

            if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS)$) {
                return 405;
            }

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_allow_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Vary "Origin" always;
                add_header Content-Length 0 always;
                add_header Content-Type "text/plain; charset=utf-8" always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_allow_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Vary "Origin" always;

            proxy_pass http://campaign;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        location /track/ {
            limit_req zone=campaign_limit burst=60 nodelay;

            if ($request_method !~ ^(GET|POST|OPTIONS)$) {
                return 405;
            }

            proxy_pass http://campaign;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        location / {
            return 404;
        }
    }
}
