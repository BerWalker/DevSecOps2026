<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overview — PhishGuard Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app-root"></div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    Session.requireAuth();
    const content = renderShell("dashboard.html", "Overview");

    async function load() {
      content.innerHTML = `<div class="loading">Loading data...</div>`;

      try {
        const result = await Api.getDashboard();
        const data = result.data;
        setTopbarMeta(`${data.total_campaigns} campaign(s)`);
        render(data);
      } catch (err) {
        content.innerHTML = `<div class="alert alert--error">${escapeHtml(err.message || "Could not load overview.")}</div>`;
      }
    }

    function render(data) {
      const rows = (data.campaigns || [])
        .map((c) => `
          <tr>
            <td><a class="table-link" href="campaign-detail.html?id=${encodeURIComponent(c.campaign_id)}">${escapeHtml(c.name)}</a></td>
            <td class="is-num">${c.target_count}</td>
            <td class="is-num">${c.click_count}</td>
            <td class="is-num">${c.clicked_target_count}</td>
            <td>
              <div class="signal">
                <span class="signal__track"><span class="signal__fill" style="width:${Math.min(100, Math.round(c.click_rate * 100))}%"></span></span>
                ${formatPercent(c.click_rate)}
              </div>
            </td>
          </tr>
        `)
        .join("");

      const tableOrEmpty = (data.campaigns || []).length
        ? `<table>
            <thead>
              <tr>
                <th>Campaign</th>
                <th class="is-num">Targets</th>
                <th class="is-num">Clicks</th>
                <th class="is-num">Targets with clicks</th>
                <th>Click rate</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`
        : `<div class="empty">
            <div class="empty__title">No campaigns yet</div>
            <div class="empty__sub">Create your first campaign to start collecting metrics.</div>
          </div>`;

      content.innerHTML = `
        <div class="stat-row">
          <div class="stat">
            <div class="stat__label">Campaigns</div>
            <div class="stat__value">${data.total_campaigns}</div>
          </div>
          <div class="stat">
            <div class="stat__label">Total targets</div>
            <div class="stat__value">${data.total_targets}</div>
          </div>
          <div class="stat">
            <div class="stat__label">Recorded clicks</div>
            <div class="stat__value">${data.total_clicks}</div>
          </div>
          <div class="stat">
            <div class="stat__label">Overall click rate</div>
            <div class="stat__value">${formatPercent(data.click_rate)} <small>/ ${data.clicked_target_count} targets</small></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel__header">
            <h2>Campaigns by performance</h2>
            <a class="btn btn--sm" href="campaigns.html">View all</a>
          </div>
          <div class="panel__body--flush">
            ${tableOrEmpty}
          </div>
        </div>
      `;
    }

    load();
  </script>
</body>
</html>
