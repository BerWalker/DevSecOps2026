<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campaign — PhishGuard Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app-root"></div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    Session.requireAuth();

    const params = new URLSearchParams(window.location.search);
    const campaignId = params.get("id");
    const isEdit = !!campaignId;

    const content = renderShell("campaigns.html", isEdit ? "Edit campaign" : "New campaign");

    let groupCounter = 0;
    let targetCounter = 0;

    function emptyTarget() {
      targetCounter += 1;
      return { uid: `t${targetCounter}`, email: "", name: "" };
    }

    function emptyGroup() {
      groupCounter += 1;
      return { uid: `g${groupCounter}`, name: "", targets: [emptyTarget()] };
    }

    // Local state for target groups
    let groups = [emptyGroup()];

    content.innerHTML = `
      <div id="form-alert"></div>

      <form id="campaign-form" novalidate>
        <div class="panel">
          <div class="panel__header">
            <h2>Details</h2>
          </div>
          <div class="panel__body">
            <div class="field">
              <label for="name">Campaign name</label>
              <input type="text" id="name" name="name" required maxlength="255" />
            </div>
            <div class="field">
              <label for="redirect_url">Redirect URL after click</label>
              <input type="url" id="redirect_url" name="redirect_url" required maxlength="2048"
                     placeholder="https://www.youtube.com/watch?v=..." />
              <p class="field__hint">
                When a target clicks the tracking link in the email, they are redirected here
                after the click is recorded (e.g. YouTube, an internal page, or any https site).
              </p>
            </div>
            <div class="field">
              <label for="email_content">Email content (HTML)</label>

              <div class="tabs">
                <button type="button" class="tab is-active" id="tab-code" data-tab="code">Code</button>
                <button type="button" class="tab" id="tab-preview" data-tab="preview">Preview</button>
              </div>

              <div id="email-code-pane">
                <textarea id="email_content" name="email_content" required></textarea>
              </div>

              <div id="email-preview-pane" class="preview-frame" hidden>
                <iframe id="email-preview-frame" title="Email preview" sandbox=""></iframe>
              </div>

              <p class="field__hint">
                Use <code>{{tracking_url}}</code>, <code>{{target_name}}</code>, and <code>{{target_email}}</code>
                — they are replaced per target before sending. The preview shows these values
                filled with sample data.
              </p>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel__header">
            <h2>Target groups</h2>
            <button type="button" class="btn btn--sm" id="add-group-btn">Add group</button>
          </div>
          <div class="panel__body" id="groups-container"></div>
        </div>

        <div class="btn-row">
          <button type="submit" class="btn btn--primary" id="submit-btn">${isEdit ? "Save changes" : "Create campaign"}</button>
          <a class="btn btn--ghost" href="campaigns.html">Cancel</a>
          ${isEdit ? `<button type="button" class="btn btn--danger" id="delete-btn" style="margin-left:auto">Delete campaign</button>` : ""}
        </div>
      </form>
    `;

    const alertBox = document.getElementById("form-alert");
    const groupsContainer = document.getElementById("groups-container");

    function renderGroups() {
      groupsContainer.innerHTML = groups
        .map((group, gi) => `
          <div class="group" data-group="${group.uid}">
            <div class="group__header">
              <input type="text" placeholder="Group name (e.g. Finance)" maxlength="255"
                     value="${escapeHtml(group.name)}" data-role="group-name" data-group="${group.uid}" />
              ${groups.length > 1 ? `<button type="button" class="icon-btn" data-action="remove-group" data-group="${group.uid}" title="Remove group">×</button>` : ""}
            </div>
            <div class="group__body">
              ${group.targets.map((target) => `
                <div class="target-row" data-target="${target.uid}">
                  <input type="email" placeholder="email@company.com" required
                         value="${escapeHtml(target.email)}" data-role="target-email" data-group="${group.uid}" data-target="${target.uid}" />
                  <input type="text" placeholder="Name (optional)" maxlength="255"
                         value="${escapeHtml(target.name)}" data-role="target-name" data-group="${group.uid}" data-target="${target.uid}" />
                  ${group.targets.length > 1 ? `<button type="button" class="icon-btn" data-action="remove-target" data-group="${group.uid}" data-target="${target.uid}" title="Remove target">×</button>` : `<span></span>`}
                </div>
              `).join("")}
              <div class="group__actions">
                <button type="button" class="btn btn--sm" data-action="add-target" data-group="${group.uid}">Add target</button>
              </div>
            </div>
          </div>
        `)
        .join("");
    }

    function syncStateFromInputs() {
      groupsContainer.querySelectorAll("[data-role='group-name']").forEach((input) => {
        const group = groups.find((g) => g.uid === input.dataset.group);
        if (group) group.name = input.value;
      });
      groupsContainer.querySelectorAll("[data-role='target-email']").forEach((input) => {
        const group = groups.find((g) => g.uid === input.dataset.group);
        const target = group && group.targets.find((t) => t.uid === input.dataset.target);
        if (target) target.email = input.value;
      });
      groupsContainer.querySelectorAll("[data-role='target-name']").forEach((input) => {
        const group = groups.find((g) => g.uid === input.dataset.group);
        const target = group && group.targets.find((t) => t.uid === input.dataset.target);
        if (target) target.name = input.value;
      });
    }

    groupsContainer.addEventListener("click", (event) => {
      const btn = event.target.closest("button[data-action]");
      if (!btn) return;
      syncStateFromInputs();

      const action = btn.dataset.action;
      const groupUid = btn.dataset.group;
      const group = groups.find((g) => g.uid === groupUid);

      if (action === "add-target" && group) {
        group.targets.push(emptyTarget());
      } else if (action === "remove-target" && group) {
        group.targets = group.targets.filter((t) => t.uid !== btn.dataset.target);
      } else if (action === "remove-group") {
        groups = groups.filter((g) => g.uid !== groupUid);
      }
      renderGroups();
    });

    // --- code / email preview toggle ---
    const tabCode = document.getElementById("tab-code");
    const tabPreview = document.getElementById("tab-preview");
    const codePane = document.getElementById("email-code-pane");
    const previewPane = document.getElementById("email-preview-pane");
    const previewFrame = document.getElementById("email-preview-frame");
    const emailContentField = document.getElementById("email_content");

    const SAMPLE_VALUES = {
      "{{tracking_url}}": "https://example.test/track/sample-link",
      "{{target_name}}": "Jane Doe",
      "{{target_email}}": "jane.doe@company.com",
    };

    function renderPreview() {
      let html = emailContentField.value || "";
      for (const [placeholder, value] of Object.entries(SAMPLE_VALUES)) {
        html = html.split(placeholder).join(value);
      }
      previewFrame.srcdoc = html;
    }

    function setActiveTab(tab) {
      const isCode = tab === "code";
      tabCode.classList.toggle("is-active", isCode);
      tabPreview.classList.toggle("is-active", !isCode);
      codePane.hidden = !isCode;
      previewPane.hidden = isCode;
      if (!isCode) renderPreview();
    }

    tabCode.addEventListener("click", () => setActiveTab("code"));
    tabPreview.addEventListener("click", () => setActiveTab("preview"));

    document.getElementById("add-group-btn").addEventListener("click", () => {
      syncStateFromInputs();
      groups.push(emptyGroup());
      renderGroups();
    });

    renderGroups();

    // --- load existing data in edit mode ---
    async function loadExisting() {
      content.querySelectorAll("input, textarea, button").forEach((el) => (el.disabled = true));
      try {
        const result = await Api.getCampaign(campaignId);
        const campaign = result.data;
        document.getElementById("name").value = campaign.name;
        document.getElementById("redirect_url").value = campaign.redirect_url || "";
        document.getElementById("email_content").value = campaign.email_content;

        if (campaign.target_groups && campaign.target_groups.length) {
          groups = campaign.target_groups.map((g) => {
            groupCounter += 1;
            return {
              uid: `g${groupCounter}`,
              name: g.name,
              targets: g.targets.length
                ? g.targets.map((t) => {
                    targetCounter += 1;
                    return { uid: `t${targetCounter}`, email: t.email, name: t.name || "" };
                  })
                : [emptyTarget()],
            };
          });
        }
        renderGroups();
      } catch (err) {
        showAlert(alertBox, err.message || "Could not load campaign.", "error");
      } finally {
        content.querySelectorAll("input, textarea, button").forEach((el) => (el.disabled = false));
      }
    }

    if (isEdit) loadExisting();

    // --- submission ---
    function buildPayload() {
      syncStateFromInputs();

      const name = document.getElementById("name").value.trim();
      const redirect_url = document.getElementById("redirect_url").value.trim();
      const email_content = document.getElementById("email_content").value;

      const target_groups = groups
        .map((g) => ({
          name: g.name.trim(),
          targets: g.targets
            .map((t) => ({ email: t.email.trim(), name: t.name.trim() || null }))
            .filter((t) => t.email),
        }))
        .filter((g) => g.name && g.targets.length);

      return { name, redirect_url, email_content, target_groups };
    }

    const form = document.getElementById("campaign-form");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearAlert(alertBox);

      const payload = buildPayload();
      if (!payload.name) {
        showAlert(alertBox, "Enter a campaign name.", "error");
        return;
      }
      if (!payload.redirect_url) {
        showAlert(alertBox, "Enter the redirect URL after click.", "error");
        return;
      }
      if (!payload.email_content.trim()) {
        showAlert(alertBox, "Enter the email content.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Saving...";

      try {
        if (isEdit) {
          await Api.updateCampaign(campaignId, payload);
          window.location.href = `campaign-detail.html?id=${encodeURIComponent(campaignId)}`;
        } else {
          const result = await Api.createCampaign(payload);
          window.location.href = `campaign-detail.html?id=${encodeURIComponent(result.data.id)}`;
        }
      } catch (err) {
        showAlert(alertBox, err.message || "Could not save campaign.", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = isEdit ? "Save changes" : "Create campaign";
      }
    });

    const deleteBtn = document.getElementById("delete-btn");
    if (deleteBtn) {
      deleteBtn.addEventListener("click", async () => {
        if (!confirm("Delete this campaign? This action cannot be undone.")) return;
        deleteBtn.disabled = true;
        deleteBtn.textContent = "Deleting...";
        try {
          await Api.deleteCampaign(campaignId);
          window.location.href = "campaigns.html";
        } catch (err) {
          showAlert(alertBox, err.message || "Could not delete campaign.", "error");
          deleteBtn.disabled = false;
          deleteBtn.textContent = "Delete campaign";
        }
      });
    }
  </script>
</body>
</html>
