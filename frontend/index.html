<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — PhishGuard Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-box">
      <div class="auth-box__brand">
        <span class="auth-box__brand-mark"></span>
        <span class="auth-box__brand-text">phishguard<span>/console</span></span>
      </div>

      <h2>Sign in</h2>
      <p class="auth-box__sub">Access the phishing simulation platform.</p>

      <div id="form-alert"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <div class="btn-row">
          <button type="submit" class="btn btn--primary btn--full" id="submit-btn">Sign in</button>
        </div>
      </form>

      <p class="auth-box__switch">
        Don't have an account yet? <a href="register.html">Create account</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    Session.redirectIfAuthenticated();

    const params = new URLSearchParams(window.location.search);
    const alertBox = document.getElementById("form-alert");
    if (params.get("expired") === "1") {
      showAlert(alertBox, "Your session has expired. Please sign in again.", "info");
    }
    if (params.get("registered") === "1") {
      showAlert(alertBox, "Account created successfully. Sign in with your credentials.", "ok");
    }

    const form = document.getElementById("login-form");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearAlert(alertBox);

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in...";

      try {
        const result = await Api.login(email, password);
        Session.set(result.token, email);
        window.location.href = "dashboard.html";
      } catch (err) {
        showAlert(alertBox, err.message || "Could not sign in.", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
