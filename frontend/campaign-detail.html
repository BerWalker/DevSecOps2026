<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campaign — PhishGuard Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app-root"></div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    Session.requireAuth();

    const params = new URLSearchParams(window.location.search);
    const campaignId = params.get("id");

    const content = renderShell("campaigns.html", "Campaign");

    if (!campaignId) {
      content.innerHTML = `<div class="alert alert--error">Campaign ID not specified.</div>`;
    } else {
      load();
    }

    async function load() {
      content.innerHTML = `<div class="loading">Loading campaign...</div>`;

      let campaign;
      try {
        const result = await Api.getCampaign(campaignId);
        campaign = result.data;
      } catch (err) {
        content.innerHTML = `<div class="alert alert--error">${escapeHtml(err.message || "Could not load campaign.")}</div>`;
        return;
      }

      let analytics = null;
      try {
        const result = await Api.getCampaignAnalytics(campaignId);
        analytics = result.data;
      } catch {
        /* analytics unavailable — continue without detailed metrics */
      }

      render(campaign, analytics);
    }

    function render(campaign, analytics) {
      setTopbarMeta(`Updated on ${formatDateTime(campaign.updated_at)}`);

      const targets = analytics ? analytics.targets : null;

      const statsHtml = analytics
        ? `
          <div class="stat-row">
            <div class="stat">
              <div class="stat__label">Targets</div>
              <div class="stat__value">${analytics.target_count}</div>
            </div>
            <div class="stat">
              <div class="stat__label">Clicks</div>
              <div class="stat__value">${analytics.click_count}</div>
            </div>
            <div class="stat">
              <div class="stat__label">Targets with clicks</div>
              <div class="stat__value">${analytics.clicked_target_count}</div>
            </div>
            <div class="stat">
              <div class="stat__label">Click rate</div>
              <div class="stat__value">${formatPercent(analytics.click_rate)}</div>
            </div>
          </div>`
        : `<div class="alert alert--info">Metrics unavailable at the moment.</div>`;

      const targetRows = (targets || [])
        .map((t) => {
          const geo = t.geolocation;
          const location = geo && (geo.city || geo.country)
            ? [geo.city, geo.country].filter(Boolean).join(", ")
            : "—";
          const statusBadge = t.clicked
            ? `<span class="badge badge--dot badge--warn">Clicked</span>`
            : `<span class="badge badge--dot badge--off">No interaction</span>`;
          return `
            <tr>
              <td>${escapeHtml(t.email)}</td>
              <td class="is-muted">${escapeHtml(t.name || "—")}</td>
              <td class="is-muted">${escapeHtml(t.group_name || "—")}</td>
              <td>${statusBadge}</td>
              <td class="is-num">${t.click_count}</td>
              <td class="is-muted">${escapeHtml(location)}</td>
              <td class="is-muted">${formatDateTime(t.last_click_at)}</td>
            </tr>
          `;
        })
        .join("");

      const targetsTableOrEmpty = targets && targets.length
        ? `<table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Name</th>
                <th>Group</th>
                <th>Status</th>
                <th class="is-num">Clicks</th>
                <th>Location</th>
                <th>Last click</th>
              </tr>
            </thead>
            <tbody>${targetRows}</tbody>
          </table>`
        : `<div class="empty">
            <div class="empty__title">No target data</div>
            <div class="empty__sub">Add target groups to this campaign to track interactions.</div>
          </div>`;

      const groupsHtml = (campaign.target_groups || [])
        .map((group) => `
          <div class="section-title">${escapeHtml(group.name)} · ${group.targets.length} target(s)</div>
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Name</th>
                <th>Tracking link</th>
              </tr>
            </thead>
            <tbody>
              ${group.targets.map((t) => `
                <tr>
                  <td>${escapeHtml(t.email)}</td>
                  <td class="is-muted">${escapeHtml(t.name || "—")}</td>
                  <td>
                    ${t.tracking
                      ? `<div class="copy-field">
                          <input type="text" class="is-mono" readonly value="${escapeHtml(t.tracking.url)}" onclick="this.select()" />
                          <button type="button" class="btn btn--sm" data-copy="${escapeHtml(t.tracking.url)}">Copy</button>
                        </div>`
                      : `<span class="is-muted">—</span>`}
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `)
        .join("");

      content.innerHTML = `
        <div id="action-alert"></div>

        ${statsHtml}

        <div class="detail-grid">
          <div class="panel">
            <div class="panel__header">
              <h2>Summary</h2>
              <a class="btn btn--sm" href="campaign-form.html?id=${encodeURIComponent(campaign.id)}">Edit</a>
            </div>
            <div class="panel__body">
              <dl class="kv">
                <dt>Name</dt>
                <dd>${escapeHtml(campaign.name)}</dd>
                <dt>Redirect URL</dt>
                <dd>${
                  campaign.redirect_url
                    ? `<a href="${escapeHtml(campaign.redirect_url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(campaign.redirect_url)}</a>`
                    : `<span class="is-muted">—</span>`
                }</dd>
                <dt>ID</dt>
                <dd>${escapeHtml(campaign.id)}</dd>
                <dt>Groups</dt>
                <dd>${(campaign.target_groups || []).length}</dd>
                <dt>Targets</dt>
                <dd>${(campaign.target_groups || []).reduce((sum, g) => sum + g.targets.length, 0)}</dd>
                <dt>Created on</dt>
                <dd>${formatDateTime(campaign.created_at)}</dd>
                <dt>Updated on</dt>
                <dd>${formatDateTime(campaign.updated_at)}</dd>
              </dl>
              <div class="btn-row">
                <button type="button" class="btn btn--primary" id="send-btn">Send campaign</button>
                <a class="btn" id="export-btn" href="#">Export CSV</a>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel__header">
              <h2>Email content</h2>
            </div>
            <div class="panel__body">
              <div class="tabs">
                <button type="button" class="tab is-active" id="detail-tab-code" data-tab="code">Code</button>
                <button type="button" class="tab" id="detail-tab-preview" data-tab="preview">Preview</button>
              </div>

              <div id="detail-email-code-pane">
                <pre class="is-mono" style="white-space: pre-wrap; word-break: break-word; font-size: 12px; color: var(--text-muted); border: 1px solid var(--border-strong); border-radius: 0 var(--radius) var(--radius) var(--radius); padding: 11px; margin: 0;">${escapeHtml(campaign.email_content)}</pre>
              </div>

              <div id="detail-email-preview-pane" class="preview-frame" hidden>
                <iframe id="detail-email-preview-frame" title="Email preview" sandbox=""></iframe>
              </div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel__header">
            <h2>Targets and interactions</h2>
          </div>
          <div class="panel__body--flush">
            ${targetsTableOrEmpty}
          </div>
        </div>

        <div class="panel">
          <div class="panel__header">
            <h2>Tracking links by group</h2>
          </div>
          <div class="panel__body">
            ${groupsHtml || `<div class="empty"><div class="empty__title">No target groups</div></div>`}
          </div>
        </div>
      `;

      bindActions(campaign);
    }

    function bindActions(campaign) {
      const actionAlert = document.getElementById("action-alert");

      // --- code / email content preview toggle ---
      const detailTabCode = document.getElementById("detail-tab-code");
      const detailTabPreview = document.getElementById("detail-tab-preview");
      const detailCodePane = document.getElementById("detail-email-code-pane");
      const detailPreviewPane = document.getElementById("detail-email-preview-pane");
      const detailPreviewFrame = document.getElementById("detail-email-preview-frame");

      const SAMPLE_VALUES = {
        "{{tracking_url}}": "https://example.test/track/sample-link",
        "{{target_name}}": "Jane Doe",
        "{{target_email}}": "jane.doe@company.com",
      };

      function renderDetailPreview() {
        let html = campaign.email_content || "";
        for (const [placeholder, value] of Object.entries(SAMPLE_VALUES)) {
          html = html.split(placeholder).join(value);
        }
        detailPreviewFrame.srcdoc = html;
      }

      detailTabCode.addEventListener("click", () => {
        detailTabCode.classList.add("is-active");
        detailTabPreview.classList.remove("is-active");
        detailCodePane.hidden = false;
        detailPreviewPane.hidden = true;
      });

      detailTabPreview.addEventListener("click", () => {
        detailTabPreview.classList.add("is-active");
        detailTabCode.classList.remove("is-active");
        detailCodePane.hidden = true;
        detailPreviewPane.hidden = false;
        renderDetailPreview();
      });

      document.getElementById("send-btn").addEventListener("click", async (event) => {
        const btn = event.currentTarget;
        if (!confirm(`Send simulation emails to all targets in "${campaign.name}"?`)) return;

        btn.disabled = true;
        btn.textContent = "Sending...";
        clearAlert(actionAlert);

        try {
          const result = await Api.sendCampaign(campaign.id);
          const data = result.data || {};
          if (result.status === "success") {
            showAlert(actionAlert, `Campaign sent successfully to ${data.sent_count} target(s).`, "ok");
          } else {
            showAlert(actionAlert, `Sent to ${data.sent_count} target(s), with ${data.failed_count} failure(s).`, "info");
          }
        } catch (err) {
          showAlert(actionAlert, err.message || "Could not send campaign.", "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Send campaign";
        }
      });

      document.getElementById("export-btn").addEventListener("click", async (event) => {
        event.preventDefault();
        const btn = event.currentTarget;
        const original = btn.textContent;
        btn.textContent = "Preparing...";

        try {
          const response = await Api.exportCampaignCsv(campaign.id);
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `campaign_${campaign.id}_report.csv`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        } catch (err) {
          showAlert(actionAlert, err.message || "Could not export report.", "error");
        } finally {
          btn.textContent = original;
        }
      });

      content.querySelectorAll("[data-copy]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const value = btn.dataset.copy;
          try {
            await navigator.clipboard.writeText(value);
            const original = btn.textContent;
            btn.textContent = "Copied";
            setTimeout(() => (btn.textContent = original), 1200);
          } catch {
            /* clipboard unavailable — user can select manually */
          }
        });
      });
    }
  </script>
</body>
</html>
